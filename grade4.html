<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 4 - Futakotamagawa ES</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #2c3e50;
            text-align: center;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 30px 20px;
            border-bottom: 5px solid #3498db;
        }
        h1 { margin: 0; font-size: 1.8rem; }
        h2 { margin: 5px 0 0 0; font-size: 1rem; font-weight: 300; color: #bdc3c7; }
        
        .grade-title-box {
            background-color: #3498db;
            color: white;
            padding: 15px;
            margin-bottom: 40px;
        }
        .grade-title-box h3 {
            margin: 0;
            font-size: 2rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            min-height: 300px;
        }

        .placeholder-text {
            color: #95a5a6;
            font-style: italic;
            margin-top: 50px;
        }

        /* The Return Button */
        .back-button {
            display: inline-block;
            margin-top: 40px;
            padding: 15px 30px;
            background-color: #95a5a6;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .back-button:hover {
            background-color: #7f8c8d;
        }
        
        footer {
            margin-top: 100px;
            padding-bottom: 30px;
            font-size: 0.8rem;
            color: #95a5a6;
        }
    </style>
</head>
<body>

<header>
    <h1>Futakotamagawa Elementary School</h1>
    <h2>世田谷区立二子玉川小学校</h2>
</header>

<div class="grade-title-box">
    <h3>Grade 4 / 4年生</h3>
</div>

<div class="container">
    <p class="placeholder-text">New activities coming soon...<br>新しい活動は近日公開予定です...</p>
    
    <!-- This is where you will add buttons for games later -->

    <a href="index.html" class="back-button">
        ← Return / 戻る
    </a>
</div>

<footer>
