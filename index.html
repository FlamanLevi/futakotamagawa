<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futakotamagawa ES - English Lab</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #2c3e50;
            text-align: center;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 50px 20px;
            border-bottom: 5px solid #3498db;
        }
        h1 {
            margin: 0;
            font-size: 2.2rem;
            font-weight: 700;
        }
        h2 {
            margin: 10px 0 0 0;
            font-size: 1.1rem;
            font-weight: 400;
            color: #bdc3c7;
        }
        .container {
            max-width: 1000px;
            margin: 50px auto;
            padding: 0 20px;
        }
        .instruction {
            font-size: 1.2rem;
            margin-bottom: 40px;
            color: #7f8c8d;
        }
        .grade-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
        }
        .grade-button {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 35px 20px;
            background-color: white;
            border-radius: 20px;
            text-decoration: none;
            color: #2c3e50;
            transition: all 0.25s ease;
            box-shadow: 0 6px 12px rgba(0,0,0,0.08);
            border: 1px solid #e0e0e0;
        }
        .grade-button:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.15);
            border-color: #3498db;
        }
        .en-label {
            font-size: 1.8rem;
            font-weight: bold;
            color: #3498db;
            margin-bottom: 5px;
        }
        .jp-label {
            font-size: 1.2rem;
            font-weight: 600;
            color: #34495e;
        }
        .teacher-label {
            font-size: 0.95rem;
            color: #7f8c8d; /* A subtle grey to contrast with the dark blue text */
            margin-top: 10px; /* Adds a little breathing room above the teacher's name */
            font-style: italic;
        }
        footer {
            margin-top: 80px;
            padding-bottom: 40px;
            font-size: 0.9rem;
            color: #95a5a6;
        }
    </style>
</head>
<body>

<header>
    <h1>Futakotamagawa Elementary School</h1>
    <h2>世田谷区立二子玉川小学校</h2>
</header>

<div class="container">
    <p class="instruction">Select your grade / 学年を選択してください</p>
    
    <div class="grade-grid">
        <a href="grade3.html" class="grade-button">
            <span class="en-label">Grade 3</span>
            <span class="jp-label">3年生</span>
        </a>

        <a href="grade4.html" class="grade-button">
            <span class="en-label">Grade 4</span>
            <span class="jp-label">4年生</span>
        </a>

        <a href="grade5.html" class="grade-button">
            <span class="en-label">Grade 5</span>
            <span class="jp-label">5年生</span>
            <span class="teacher-label">Yoshimura Sensei (吉村先生)</span>
        </a>

        <a href="grade6.html" class="grade-button">
            <span class="en-label">Grade 6</span>
            <span class="jp-label">6年生</span>
            <span class="teacher-label">Sakai Sensei (酒井先生)</span>
        </a>
    </div>
</div>

<footer>
    &copy; 2026 Levi Flaman | Designed for classroom use
</footer>

</body>
</html>
